name: Terraform Pipeline with PR Approval

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  push:
    branches: [ main ]

env:
  TF_VERSION: '1.5.0'
  AWS_REGION: 'us-east-1'

permissions:
  contents: write
  id-token: write
  pull-requests: write
  checks: write

jobs:
  # ============================================
  # JOB 1: Terraform Plan
  # ============================================
  # Purpose: Generate Terraform plan and comment on PR
  # Runs: On every PR from dev to main
  # ============================================
  terraform-plan:
    name: "📋 Terraform Plan"
    runs-on: ubuntu-latest
    # Only run for PRs from dev branch to main branch
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'dev'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true  # Don't fail the workflow for formatting issues
      
      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="dev.tfvars" -out=tfplan
      
      - name: Save Plan Output
        run: terraform show tfplan > plan.txt
      
      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-${{ github.event.pull_request.head.sha }}
          path: |
            tfplan
            plan.txt
          retention-days: 1
      
      - name: Comment PR with Plan Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan.txt', 'utf8');
            
            // Get existing comments to avoid duplicate
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existingPlanComment = comments.find(comment => 
              comment.body.includes('## 📋 Terraform Plan Summary')
            );
            
            const comment = `## 📋 Terraform Plan Summary
            
            **Branch:** \`${process.env.GITHUB_HEAD_REF}\` → \`${process.env.GITHUB_BASE_REF}\`
            **Commit:** \`${process.env.GITHUB_SHA}\`
            
            ### Plan Output:
            \`\`\`terraform
            ${planOutput.substring(0, 5000)}
            \`\`\`
            
            ---
            ### ✅ Next Steps:
            This plan is ready for review. When you're ready to deploy:
            
            1. **Approve this PR** (click "Approve" in the PR review section)
            2. **Merge this PR** to main
            
            The infrastructure will be automatically deployed after merge.
            
            *Note: The deployment will only happen after the PR is merged to main.*`;
            
            if (existingPlanComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                comment_id: existingPlanComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # ============================================
  # JOB 2: Terraform Apply (on PR Merge)
  # ============================================
  # Purpose: Apply Terraform changes after PR is merged to main
  # Runs: When push to main happens (after PR merge)
  # ============================================
  terraform-apply:
    name: "🚀 Terraform Apply"
    runs-on: ubuntu-latest
    # Run when push to main happens
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Apply
        id: apply
        run: terraform apply -var-file="dev.tfvars" -auto-approve
      
      - name: Get Terraform Outputs
        id: outputs
        run: |
          echo "OUTPUTS<<EOF" >> $GITHUB_ENV
          terraform output -json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        continue-on-error: true
      
      - name: Create Deployment Summary
        run: |
          echo "## ✅ Terraform Apply Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure has been deployed successfully to AWS." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- **AWS Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** PR merged to main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Managed Resources:" >> $GITHUB_STEP_SUMMARY
          terraform state list 2>/dev/null | while read -r resource; do
            echo "- \`$resource\`" >> $GITHUB_STEP_SUMMARY
          done || echo "*No resources found in state*" >> $GITHUB_STEP_SUMMARY
      
      - name: Find and Comment on Original PR
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            // Get the latest commit message to find the PR number
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              per_page: 1
            });
            
            const latestCommit = commits[0];
            const commitMessage = latestCommit.commit.message;
            
            // Extract PR number from merge commit message (format: "Merge pull request #123 from ...")
            const prMatch = commitMessage.match(/Merge pull request #(\d+)/);
            
            if (prMatch && prMatch[1]) {
              const prNumber = parseInt(prMatch[1]);
              
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ✅ Terraform Apply Complete!\n\nThe infrastructure changes from this PR have been successfully deployed to AWS. 🚀\n\n**Deployment Time:** ' + new Date().toISOString()
              });
            } else {
              console.log('Could not find PR number in commit message');
            }

  # ============================================
  # JOB 3: Deployment Status Check
  # ============================================
  # Purpose: Update PR status based on deployment success
  # ============================================
  update-status:
    name: "📊 Update PR Status"
    needs: terraform-apply
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Get PR Number
        uses: actions/github-script@v7
        with:
          script: |
            // Get the latest commit
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              per_page: 1
            });
            
            const latestCommit = commits[0];
            const commitMessage = latestCommit.commit.message;
            const prMatch = commitMessage.match(/Merge pull request #(\d+)/);
            
            if (prMatch && prMatch[1]) {
              const prNumber = parseInt(prMatch[1]);
              const status = '${{ needs.terraform-apply.result }}';
              
              let statusMessage = '';
              let statusEmoji = '';
              
              if (status === 'success') {
                statusMessage = '✅ Deployment successful! Infrastructure changes have been applied.';
                statusEmoji = '✅';
              } else if (status === 'failure') {
                statusMessage = '❌ Deployment failed! Please check the workflow logs for details.';
                statusEmoji = '❌';
              } else {
                statusMessage = '⚠️ Deployment status unknown or skipped.';
                statusEmoji = '⚠️';
              }
              
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ${statusEmoji} Deployment Status\n\n${statusMessage}\n\n**Workflow Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }
